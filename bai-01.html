<!DOCTYPE html>

    <h1>GIỚI THIỆU NGÔN NGỮ <mark>HTML</mark></h1>
    <p><mark>HTML</mark>, viết tắt của <b>H</b>yper <b>T</b>ext <b>M</b>arkup <b>L</b>anguage, là <ins>ngôn ngữ đánh dấu</ins> chuẩn để tạo ra các trang web.</p>
    <p ><mark>HTML</mark> chỉ định <i>bố cục, cách hiển thị</i> nội dung một trang web lên <span title="Trình duyệt là một phần mềm ứng dụng cho phép truy cập thông tin trên web"><b><i>trình duyệt</i></b></span> (browser).</p>
